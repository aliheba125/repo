name: Build and Deploy APT Repo (Dragon)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Atomic GitHub Pages deployment via Actions artifact (no gh-pages branch race).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev xz-utils
          pip3 install termux-apt-repo

      - name: Build .deb packages
        run: |
          mkdir -p debs repo
          rm -rf debs/* repo/*
          for pkg_dir in packages/*/; do
            if [ -f "${pkg_dir}/DEBIAN/control" ]; then
              chmod 0755 "${pkg_dir}/DEBIAN/"post* "${pkg_dir}/DEBIAN/"pre* 2>/dev/null || true
              dpkg-deb -b -Zxz "${pkg_dir}" debs/
            fi
          done
          echo "Built $(ls debs/*.deb | wc -l) packages"

      - name: Generate APT repository (unsigned; installer uses [trusted=yes])
        run: termux-apt-repo debs repo termuxvoid main

      - name: Ensure .nojekyll
        run: touch repo/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
